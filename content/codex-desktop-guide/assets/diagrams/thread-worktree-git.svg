<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="diagrams/thread-worktree-git.svg">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/></filter>
<style><![CDATA[
text{font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;letter-spacing:0;}
.title{font-size:30px;font-weight:700;fill:#172033}
.subtitle{font-size:18px;fill:#64748b}
.small{font-size:15px;fill:#64748b}
.body{font-size:18px;fill:#172033}
.label{font-size:16px;font-weight:700;fill:#172033}
.callout{font-size:15px;fill:#172033}
.badge{font-size:14px;font-weight:700;fill:#dc2626}
.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:15px;fill:#334155}
]]></style>
</defs>
<defs>
       <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
         <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
       </marker>
     </defs>
     <rect width="1280" height="760" fill="#f6f8fb" />
     <text x="64" y="72" class="title">线程、Worktree 与 Git 的关系</text>
     <text x="64" y="104" class="subtitle">用隔离工作区降低并行任务互相干扰的概率</text>
     <g filter="url(#shadow)">
       <rect x="48" y="134" width="1184" height="570" rx="20" fill="#ffffff" stroke="#d8dee9" />
       <path d="M 320 286 C 395 286, 395 250, 470 250" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  <text x="365" y="252" class="small">Local</text>
<path d="M 320 322 C 395 322, 395 450, 470 450" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  <text x="356" y="408" class="small">Worktree</text>
<path d="M 700 450 C 775 450, 775 450, 850 450" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 940 390 C 587.5 390, 587.5 370, 235 370" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  <text x="548" y="596" class="small">Handoff / merge</text>
       <rect x="110" y="240" width="210" height="130" rx="14" fill="#eaf8ef" stroke="#16a34a" stroke-width="2"/>
              <text x="130" y="274" class="label">Local checkout</text>
              <text class="small"><tspan x="130" y="306">你平时打开和编辑的仓库目录</tspan></text>
<rect x="470" y="190" width="230" height="120" rx="14" fill="#eaf1ff" stroke="#2563eb" stroke-width="2"/>
              <text x="490" y="224" class="label">Thread A</text>
              <text class="small"><tspan x="490" y="256">小修小补可直接在 Local 执行</tspan></text>
<rect x="470" y="390" width="230" height="120" rx="14" fill="#f3ecff" stroke="#7c3aed" stroke-width="2"/>
              <text x="490" y="424" class="label">Thread B</text>
              <text class="small"><tspan x="490" y="456">复杂探索放到 Worktree</tspan></text>
<rect x="850" y="390" width="230" height="120" rx="14" fill="#fff2e8" stroke="#f97316" stroke-width="2"/>
              <text x="870" y="424" class="label">Codex worktree</text>
              <text class="small"><tspan x="870" y="456">独立检出，确认后 Handoff 或提交</tspan></text>
     </g>
</svg>
