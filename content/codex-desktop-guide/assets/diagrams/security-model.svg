<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="diagrams/security-model.svg">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/></filter>
<style><![CDATA[
text{font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;letter-spacing:0;}
.title{font-size:30px;font-weight:700;fill:#172033}
.subtitle{font-size:18px;fill:#64748b}
.small{font-size:15px;fill:#64748b}
.body{font-size:18px;fill:#172033}
.label{font-size:16px;font-weight:700;fill:#172033}
.callout{font-size:15px;fill:#172033}
.badge{font-size:14px;font-weight:700;fill:#dc2626}
.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:15px;fill:#334155}
]]></style>
</defs>
<defs>
       <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
         <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
       </marker>
     </defs>
     <rect width="1280" height="760" fill="#f6f8fb" />
     <text x="64" y="72" class="title">沙箱与批准的双层安全模型</text>
     <text x="64" y="104" class="subtitle">一个控制能做什么，一个控制什么时候需要你点头</text>
     <g filter="url(#shadow)">
       <rect x="48" y="134" width="1184" height="570" rx="20" fill="#ffffff" stroke="#d8dee9" />
       <path d="M 410 305 C 465 305, 465 305, 520 305" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 780 305 C 835 305, 835 305, 890 305" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 1020 380 C 900 380, 900 530, 780 530" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 520 530 C 400 530, 400 380, 280 380" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
       <rect x="150" y="230" width="260" height="150" rx="14" fill="#eaf1ff" stroke="#2563eb" stroke-width="2"/>
              <text x="170" y="264" class="label">Sandbox mode</text>
              <text class="small"><tspan x="170" y="296">限制可写目录、网络和系统访问范围</tspan></text>
<rect x="520" y="230" width="260" height="150" rx="14" fill="#fff2e8" stroke="#f97316" stroke-width="2"/>
              <text x="540" y="264" class="label">Approval policy</text>
              <text class="small"><tspan x="540" y="296">决定哪些动作需要人工批准</tspan></text>
<rect x="890" y="230" width="260" height="150" rx="14" fill="#eaf8ef" stroke="#16a34a" stroke-width="2"/>
              <text x="910" y="264" class="label">Human review</text>
              <text class="small"><tspan x="910" y="296">看命令、路径、数据流和 diff</tspan></text>
<rect x="520" y="480" width="260" height="110" rx="14" fill="#f3ecff" stroke="#7c3aed" stroke-width="2"/>
              <text x="540" y="514" class="label">最终原则</text>
              <text class="small"><tspan x="540" y="546">默认最小权限，需要时短时提升</tspan></text>
     </g>
</svg>
