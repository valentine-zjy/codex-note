<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="权限、沙箱与批准模型">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style><![CDATA[
      text{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;letter-spacing:0;}
      .title{font-size:36px;font-weight:800;fill:#172033}
      .subtitle{font-size:20px;fill:#64748b}
      .card-title{font-size:22px;font-weight:800;fill:#172033}
      .card-body{font-size:18px;fill:#334155}
      .arrow-label{font-size:17px;font-weight:700;fill:#64748b}
      .caption{font-size:18px;fill:#334155}
    ]]></style>
  </defs>
  <rect width="1500" height="920" fill="#f6f8fb"/>
  <text x="64" y="76" class="title">权限、沙箱与批准模型</text>
  <text x="64" y="112" class="subtitle">让 Codex 在明确边界里执行，需要越界时再由用户批准</text>
  <g filter="url(#shadow)">
    <rect x="48" y="146" width="1404" height="708" rx="24" fill="#ffffff" stroke="#d8dee9"/>
    <g>
    <path d="M 346 377 L 382 377 L 418 377" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 668 377 L 704 377 L 740 377" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 990 377 L 1026 377 L 1062 377" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 865 460 C 877.5 460, 877.5 651, 890 651" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    <text x="830" y="545" class="arrow-label">无需批准则直接验证</text>
  </g>
<g>
