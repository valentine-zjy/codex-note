  </g>
    <g>
    <rect x="96" y="294" width="250" height="166" rx="18" fill="#eaf1ff" stroke="#2563eb" stroke-width="2.4"/>
    <circle cx="124" cy="326" r="11" fill="#2563eb"/>
    <text x="148" y="334" class="card-title">用户目标</text>
    <text class="card-body"><tspan x="120" y="376">明确要改什么</tspan><tspan x="120" y="404">不能碰什么</tspan></text>
  </g>
<g>
    <rect x="418" y="294" width="250" height="166" rx="18" fill="#f3ecff" stroke="#7c3aed" stroke-width="2.4"/>
    <circle cx="446" cy="326" r="11" fill="#7c3aed"/>
    <text x="470" y="334" class="card-title">执行策略</text>
    <text class="card-body"><tspan x="442" y="376">读取指令</tspan><tspan x="442" y="404">权限</tspan><tspan x="442" y="432">沙箱和网络设置</tspan></text>
  </g>
<g>
    <rect x="740" y="294" width="250" height="166" rx="18" fill="#eaf8ef" stroke="#16a34a" stroke-width="2.4"/>
    <circle cx="768" cy="326" r="11" fill="#16a34a"/>
    <text x="792" y="334" class="card-title">沙箱执行</text>
    <text class="card-body"><tspan x="764" y="376">优先在允许范围内读取</tspan><tspan x="764" y="404">编辑和测试</tspan></text>
  </g>
<g>
    <rect x="1062" y="294" width="250" height="166" rx="18" fill="#fff0f3" stroke="#e11d48" stroke-width="2.4"/>
    <circle cx="1090" cy="326" r="11" fill="#e11d48"/>
