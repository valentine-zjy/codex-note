<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="内置浏览器调试闭环">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style><![CDATA[
      text{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;letter-spacing:0;}
      .title{font-size:36px;font-weight:800;fill:#172033}
      .subtitle{font-size:20px;fill:#64748b}
      .card-title{font-size:22px;font-weight:800;fill:#172033}
      .card-body{font-size:18px;fill:#334155}
      .arrow-label{font-size:17px;font-weight:700;fill:#64748b}
      .caption{font-size:18px;fill:#334155}
    ]]></style>
  </defs>
  <rect width="1500" height="920" fill="#f6f8fb"/>
  <text x="64" y="76" class="title">内置浏览器调试闭环</text>
  <text x="64" y="112" class="subtitle">把页面观察、代码修改和视觉验证串成一个短反馈循环</text>
  <g filter="url(#shadow)">
    <rect x="48" y="146" width="1404" height="708" rx="24" fill="#ffffff" stroke="#d8dee9"/>
    <g>
    <path d="M 354 379 L 390 379 L 426 379" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 676 379 L 712 379 L 748 379" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 998 379 L 1034 379 L 1070 379" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 1195 462 C 1051.5 462, 1051.5 657, 908 657" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 588 657 C 569.5 657, 569.5 462, 551 462" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    <text x="294" y="662" class="arrow-label">仍不理想就继续标注</text>
  </g>
    <g>
    <rect x="104" y="296" width="250" height="166" rx="18" fill="#eaf1ff" stroke="#2563eb" stroke-width="2.4"/>
    <circle cx="132" cy="328" r="11" fill="#2563eb"/>
    <text x="156" y="336" class="card-title">打开页面</text>
    <text class="card-body"><tspan x="128" y="378">进入 localhost 或</tspan><tspan x="128" y="406">目标网页</tspan></text>
  </g>
<g>
    <rect x="426" y="296" width="250" height="166" rx="18" fill="#f3ecff" stroke="#7c3aed" stroke-width="2.4"/>
    <circle cx="454" cy="328" r="11" fill="#7c3aed"/>
    <text x="478" y="336" class="card-title">标注问题</text>
    <text class="card-body"><tspan x="450" y="378">用截图或页面节点指出具体位置</tspan></text>
  </g>
<g>
    <rect x="748" y="296" width="250" height="166" rx="18" fill="#eaf8ef" stroke="#16a34a" stroke-width="2.4"/>
    <circle cx="776" cy="328" r="11" fill="#16a34a"/>
    <text x="800" y="336" class="card-title">修改代码</text>
    <text class="card-body"><tspan x="772" y="378">定位组件</tspan><tspan x="772" y="406">样式或数据逻辑</tspan></text>
  </g>
<g>
    <rect x="1070" y="296" width="250" height="166" rx="18" fill="#fff7e6" stroke="#d97706" stroke-width="2.4"/>
    <circle cx="1098" cy="328" r="11" fill="#d97706"/>
    <text x="1122" y="336" class="card-title">刷新验证</text>
    <text class="card-body"><tspan x="1094" y="378">检查 DOM</tspan><tspan x="1094" y="406">截图和交互状态</tspan></text>
  </g>
<g>
    <rect x="588" y="574" width="320" height="166" rx="18" fill="#e8fbff" stroke="#0891b2" stroke-width="2.4"/>
    <circle cx="616" cy="606" r="11" fill="#0891b2"/>
    <text x="640" y="614" class="card-title">确认交付</text>
    <text class="card-body"><tspan x="612" y="656">说明变更范围</tspan><tspan x="612" y="684">必要时提交推送</tspan></text>
  </g>
    
  </g>
</svg>
