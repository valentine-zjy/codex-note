<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="自动化任务闭环">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style><![CDATA[
      text{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;letter-spacing:0;}
      .title{font-size:36px;font-weight:800;fill:#172033}
      .subtitle{font-size:20px;fill:#64748b}
      .card-title{font-size:22px;font-weight:800;fill:#172033}
      .card-body{font-size:18px;fill:#334155}
      .arrow-label{font-size:17px;font-weight:700;fill:#64748b}
      .caption{font-size:18px;fill:#334155}
    ]]></style>
  </defs>
  <rect width="1500" height="920" fill="#f6f8fb"/>
  <text x="64" y="76" class="title">自动化任务闭环</text>
  <text x="64" y="112" class="subtitle">把一次性提醒、周期检查和长期跟进变成可维护的任务</text>
  <g filter="url(#shadow)">
    <rect x="48" y="146" width="1404" height="708" rx="24" fill="#ffffff" stroke="#d8dee9"/>
    <g>
    <path d="M 380 369 L 420 369 L 460 369" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 720 369 L 760 369 L 800 369" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 1060 369 L 1100 369 L 1140 369" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 1270 452 C 1090 452, 1090 657, 910 657" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 590 657 C 420 657, 420 452, 250 452" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    <text x="286" y="662" class="arrow-label">沉淀成更好的任务</text>
  </g>
    <g>
    <rect x="120" y="286" width="260" height="166" rx="18" fill="#eaf1ff" stroke="#2563eb" stroke-width="2.4"/>
    <circle cx="148" cy="318" r="11" fill="#2563eb"/>
    <text x="172" y="326" class="card-title">定义触发</text>
    <text class="card-body"><tspan x="144" y="368">时间</tspan><tspan x="144" y="396">周期</tspan><tspan x="144" y="424">事件或明确条件</tspan></text>
  </g>
<g>
    <rect x="460" y="286" width="260" height="166" rx="18" fill="#f3ecff" stroke="#7c3aed" stroke-width="2.4"/>
    <circle cx="488" cy="318" r="11" fill="#7c3aed"/>
    <text x="512" y="326" class="card-title">设定范围</text>
    <text class="card-body"><tspan x="484" y="368">说明要查什么</tspan><tspan x="484" y="396">输出什么</tspan><tspan x="484" y="424">如何判断</tspan></text>
  </g>
<g>
    <rect x="800" y="286" width="260" height="166" rx="18" fill="#eaf8ef" stroke="#16a34a" stroke-width="2.4"/>
    <circle cx="828" cy="318" r="11" fill="#16a34a"/>
    <text x="852" y="326" class="card-title">自动运行</text>
    <text class="card-body"><tspan x="824" y="368">到点执行检查</tspan><tspan x="824" y="396">检索或整理</tspan></text>
  </g>
<g>
    <rect x="1140" y="286" width="260" height="166" rx="18" fill="#fff7e6" stroke="#d97706" stroke-width="2.4"/>
    <circle cx="1168" cy="318" r="11" fill="#d97706"/>
    <text x="1192" y="326" class="card-title">汇报结果</text>
    <text class="card-body"><tspan x="1164" y="368">只在需要时提醒</tspan><tspan x="1164" y="396">减少噪音</tspan></text>
  </g>
<g>
    <rect x="590" y="574" width="320" height="166" rx="18" fill="#e8fbff" stroke="#0891b2" stroke-width="2.4"/>
    <circle cx="618" cy="606" r="11" fill="#0891b2"/>
    <text x="642" y="614" class="card-title">调整规则</text>
    <text class="card-body"><tspan x="614" y="656">根据反馈修改频率</tspan><tspan x="614" y="684">口径和阈值</tspan></text>
  </g>
    
  </g>
</svg>
