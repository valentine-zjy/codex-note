<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-label="Codex Desktop 推荐工作流">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style><![CDATA[
      text{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;letter-spacing:0;}
      .title{font-size:36px;font-weight:800;fill:#172033}
      .subtitle{font-size:20px;fill:#64748b}
      .card-title{font-size:22px;font-weight:800;fill:#172033}
      .card-body{font-size:18px;fill:#334155}
      .arrow-label{font-size:17px;font-weight:700;fill:#64748b}
      .caption{font-size:18px;fill:#334155}
    ]]></style>
  </defs>
  <rect width="1500" height="920" fill="#f6f8fb"/>
  <text x="64" y="76" class="title">Codex Desktop 推荐工作流</text>
  <text x="64" y="112" class="subtitle">从目标到验证，形成可审查、可回滚、可继续迭代的闭环</text>
  <g filter="url(#shadow)">
    <rect x="48" y="146" width="1404" height="708" rx="24" fill="#ffffff" stroke="#d8dee9"/>
    <g>
    <path d="M 346 343 L 382 343 L 418 343" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 668 343 L 704 343 L 740 343" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 990 343 L 1026 343 L 1062 343" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 1187 426 C 1038.5 426, 1038.5 631, 890 631" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    
  </g>
<g>
    <path d="M 570 631 C 395.5 631, 395.5 426, 221 426" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
    <text x="236" y="620" class="arrow-label">仍有问题就回到目标</text>
  </g>
    <g>
    <rect x="96" y="260" width="250" height="166" rx="18" fill="#eaf1ff" stroke="#2563eb" stroke-width="2.4"/>
    <circle cx="124" cy="292" r="11" fill="#2563eb"/>
    <text x="148" y="300" class="card-title">明确目标</text>
    <text class="card-body"><tspan x="120" y="342">说明范围</tspan><tspan x="120" y="370">限制和验收标准</tspan></text>
  </g>
<g>
    <rect x="418" y="260" width="250" height="166" rx="18" fill="#f3ecff" stroke="#7c3aed" stroke-width="2.4"/>
    <circle cx="446" cy="292" r="11" fill="#7c3aed"/>
    <text x="470" y="300" class="card-title">读取上下文</text>
    <text class="card-body"><tspan x="442" y="342">先读项目结构</tspan><tspan x="442" y="370">规则和相关文件</tspan></text>
  </g>
<g>
    <rect x="740" y="260" width="250" height="166" rx="18" fill="#eaf8ef" stroke="#16a34a" stroke-width="2.4"/>
    <circle cx="768" cy="292" r="11" fill="#16a34a"/>
    <text x="792" y="300" class="card-title">小步修改</text>
    <text class="card-body"><tspan x="764" y="342">一次解决一个清晰问题</tspan><tspan x="764" y="370">保持变更可读</tspan></text>
  </g>
<g>
    <rect x="1062" y="260" width="250" height="166" rx="18" fill="#fff7e6" stroke="#d97706" stroke-width="2.4"/>
    <circle cx="1090" cy="292" r="11" fill="#d97706"/>
    <text x="1114" y="300" class="card-title">运行验证</text>
    <text class="card-body"><tspan x="1086" y="342">测试</tspan><tspan x="1086" y="370">构建</tspan><tspan x="1086" y="398">浏览器检查或截图确认</tspan></text>
  </g>
<g>
    <rect x="570" y="548" width="320" height="166" rx="18" fill="#e8fbff" stroke="#0891b2" stroke-width="2.4"/>
    <circle cx="598" cy="580" r="11" fill="#0891b2"/>
    <text x="622" y="588" class="card-title">审查与收尾</text>
    <text class="card-body"><tspan x="594" y="630">看差异</tspan><tspan x="594" y="658">说明风险</tspan><tspan x="594" y="686">提交或继续迭代</tspan></text>
  </g>
    
  </g>
</svg>
