<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="diagrams/skills-plugins-mcp.svg">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/></filter>
<style><![CDATA[
text{font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;letter-spacing:0;}
.title{font-size:30px;font-weight:700;fill:#172033}
.subtitle{font-size:18px;fill:#64748b}
.small{font-size:15px;fill:#64748b}
.body{font-size:18px;fill:#172033}
.label{font-size:16px;font-weight:700;fill:#172033}
.callout{font-size:15px;fill:#172033}
.badge{font-size:14px;font-weight:700;fill:#dc2626}
.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:15px;fill:#334155}
]]></style>
</defs>
<defs>
       <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
         <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
       </marker>
     </defs>
     <rect width="1280" height="760" fill="#f6f8fb" />
     <text x="64" y="72" class="title">Skills、Plugins、MCP 怎么选</text>
     <text x="64" y="104" class="subtitle">三者解决的问题不同，可以组合使用</text>
     <g filter="url(#shadow)">
       <rect x="48" y="134" width="1184" height="570" rx="20" fill="#ffffff" stroke="#d8dee9" />
       <path d="M 370 310 C 437.5 310, 437.5 310, 505 310" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 755 310 C 822.5 310, 822.5 310, 890 310" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 630 380 C 630 380, 630 470, 630 470" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
       <rect x="120" y="240" width="250" height="140" rx="14" fill="#eaf1ff" stroke="#2563eb" stroke-width="2"/>
              <text x="140" y="274" class="label">Skill</text>
              <text class="small"><tspan x="140" y="306">把可复用工作流写成说明、资源和脚本</tspan></text>
<rect x="505" y="240" width="250" height="140" rx="14" fill="#f3ecff" stroke="#7c3aed" stroke-width="2"/>
              <text x="525" y="274" class="label">Plugin</text>
              <text class="small"><tspan x="525" y="306">把 Skills、MCP</tspan><tspan x="525" y="328">和应用集成打包分发</tspan></text>
<rect x="890" y="240" width="250" height="140" rx="14" fill="#eaf8ef" stroke="#16a34a" stroke-width="2"/>
              <text x="910" y="274" class="label">MCP</text>
              <text class="small"><tspan x="910" y="306">连接外部工具、私有数据或实时上下文</tspan></text>
<rect x="505" y="470" width="250" height="110" rx="14" fill="#fff2e8" stroke="#f97316" stroke-width="2"/>
              <text x="525" y="504" class="label">组合方式</text>
              <text class="small"><tspan x="525" y="536">Plugin 可包含</tspan><tspan x="525" y="558">Skill，也可配置 MCP</tspan></text>
     </g>
</svg>
