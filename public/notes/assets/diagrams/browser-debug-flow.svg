<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="diagrams/browser-debug-flow.svg">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/></filter>
<style><![CDATA[
text{font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;letter-spacing:0;}
.title{font-size:30px;font-weight:700;fill:#172033}
.subtitle{font-size:18px;fill:#64748b}
.small{font-size:15px;fill:#64748b}
.body{font-size:18px;fill:#172033}
.label{font-size:16px;font-weight:700;fill:#172033}
.callout{font-size:15px;fill:#172033}
.badge{font-size:14px;font-weight:700;fill:#dc2626}
.mono{font-family:Consolas,"Cascadia Mono",monospace;font-size:15px;fill:#334155}
]]></style>
</defs>
<defs>
       <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
         <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
       </marker>
     </defs>
     <rect width="1280" height="760" fill="#f6f8fb" />
     <text x="64" y="72" class="title">内置浏览器调试闭环</text>
     <text x="64" y="104" class="subtitle">适合无需登录的本地页面和公开页面</text>
     <g filter="url(#shadow)">
       <rect x="48" y="134" width="1184" height="570" rx="20" fill="#ffffff" stroke="#d8dee9" />
       <path d="M 310 305 C 350 305, 350 305, 390 305" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 590 305 C 630 305, 630 305, 670 305" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 870 305 C 910 305, 910 305, 950 305" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  
<path d="M 1050 365 C 630 365, 630 365, 210 365" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
                  <text x="490" y="505" class="small">仍有问题继续下一轮</text>
       <rect x="110" y="245" width="200" height="120" rx="14" fill="#eaf1ff" stroke="#2563eb" stroke-width="2"/>
              <text x="130" y="279" class="label">启动服务</text>
              <text class="small"><tspan x="130" y="311">npm run dev 或项目指定命令</tspan></text>
<rect x="390" y="245" width="200" height="120" rx="14" fill="#eaf8ef" stroke="#16a34a" stroke-width="2"/>
              <text x="410" y="279" class="label">打开 URL</text>
              <text class="small"><tspan x="410" y="311">localhost、静态文件或公开页面</tspan></text>
<rect x="670" y="245" width="200" height="120" rx="14" fill="#fff2e8" stroke="#f97316" stroke-width="2"/>
              <text x="690" y="279" class="label">标注问题</text>
              <text class="small"><tspan x="690" y="311">框选元素、描述状态和期望</tspan></text>
<rect x="950" y="245" width="200" height="120" rx="14" fill="#f3ecff" stroke="#7c3aed" stroke-width="2"/>
              <text x="970" y="279" class="label">验证修复</text>
              <text class="small"><tspan x="970" y="311">刷新页面，多视口检查</tspan></text>
     </g>
</svg>
